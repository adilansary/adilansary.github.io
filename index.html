<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Adil Ansary — SQA Engineer II specializing in E2E & API automation frameworks with Playwright, Selenium, and CI/CD pipelines." />
  <meta name="keywords" content="SQA Engineer, QA Automation, Playwright, Selenium, API Testing, CI/CD, Test Automation" />
  <meta property="og:title" content="Adil Ansary | SQA Engineer II" />
  <meta property="og:description" content="Building robust automation frameworks that ship quality software at speed." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <title>Adil Ansary | SQA Engineer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- ====== Navigation ====== -->
  <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="#home" class="nav-brand" aria-label="Adil Ansary – Home">
        <span>Adil<span class="accent-dot">.</span></span>
      </a>

      <!-- Populated by render.js from data.nav.links -->
      <div class="nav-links" id="nav-links"></div>

      <div class="nav-actions">
        <button class="theme-btn" id="theme-btn" aria-label="Toggle color theme">
          <i class="fas fa-moon"></i>
        </button>
        <a href="assets/cv/resume.pdf" download class="btn btn-sm">
          <i class="fas fa-download"></i>
          <span>Resume</span>
        </a>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main id="main">

    <!-- ====== Hero ====== -->
    <section id="home" class="hero">
      <div class="hero-bg" aria-hidden="true">
        <div class="hero-grid"></div>
        <div class="hero-glow"></div>
      </div>

      <div class="container">
        <div class="hero-layout">
          <div class="hero-content">
            <!-- Populated by render.js from data.hero -->
            <div class="hero-badge"></div>

            <h1 class="hero-name"></h1>

            <p class="hero-role">
              <span class="role-static"></span><span class="role-typed" id="typed-role" aria-label="automation frameworks"></span>
            </p>

            <p class="hero-bio"></p>

            <div class="hero-actions">
              <a href="#projects" class="btn btn-primary">
                View Work <i class="fas fa-arrow-right"></i>
              </a>
              <a href="#contact" class="btn btn-ghost">Get in Touch</a>
            </div>

            <!-- Populated by render.js from data.meta -->
            <div class="hero-socials"></div>
          </div>

          <div class="hero-visual" aria-hidden="true">
            <div class="avatar-wrap">
              <img src="assets/images/profile.jpg" alt="Adil Ansary" width="320" height="320" />
              <div class="avatar-ring r1"></div>
              <div class="avatar-ring r2"></div>
            </div>
          </div>
        </div>

        <!-- Populated by render.js from data.hero.stats -->
        <div class="stats-bar" role="list"></div>
      </div>
    </section>

    <!-- ====== About ====== -->
    <section id="about" class="section" aria-labelledby="about-h">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-tag">About</span>
          <h2 id="about-h" class="section-title">Who I Am</h2>
        </div>

        <div class="about-layout reveal">
          <!-- Populated by render.js from data.about -->
          <div class="about-text"></div>
        </div>
      </div>
    </section>

    <!-- ====== Experience ====== -->
    <section id="experience" class="section section-alt" aria-labelledby="exp-h">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-tag">Career</span>
          <h2 id="exp-h" class="section-title">Experience</h2>
          <!-- Updated by render.js from data.experience.sectionDesc -->
          <p class="section-desc"></p>
        </div>

        <!-- Populated by render.js from data.experience.items -->
        <div class="timeline"></div>
      </div>
    </section>

    <!-- ====== Skills ====== -->
    <section id="skills" class="section" aria-labelledby="skills-h">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-tag">Expertise</span>
          <h2 id="skills-h" class="section-title">Skills &amp; Tools</h2>
        </div>

        <!-- Populated by render.js from data.skills -->
        <div class="skills-grid"></div>
      </div>
    </section>

    <!-- ====== Projects ====== -->
    <section id="projects" class="section section-alt" aria-labelledby="proj-h">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-tag">Work</span>
          <h2 id="proj-h" class="section-title">Projects</h2>
          <!-- Updated by render.js from data.projects.sectionDesc -->
          <p class="section-desc"></p>
        </div>

        <!-- Populated by render.js from data.projects.items -->
        <div class="projects-grid"></div>

        <div class="projects-cta reveal">
          <!-- href updated by render.js from data.meta.github -->
          <a href="#" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
            <i class="fab fa-github"></i> View All on GitHub
          </a>
        </div>
      </div>
    </section>

    <!-- ====== Education ====== -->
    <section id="education" class="section" aria-labelledby="edu-h">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-tag">Background</span>
          <h2 id="edu-h" class="section-title">Education</h2>
        </div>

        <!-- Populated by render.js from data.education -->
        <div class="edu-grid"></div>
      </div>
    </section>

    <!-- ====== Contact ====== -->
    <section id="contact" class="section section-alt" aria-labelledby="contact-h">
      <div class="container">
        <div class="section-header reveal">
          <span class="section-tag">Contact</span>
          <h2 id="contact-h" class="section-title">Get in Touch</h2>
          <!-- Updated by render.js from data.contact.sectionDesc -->
          <p class="section-desc"></p>
        </div>

        <div class="contact-layout">
          <!-- Populated by render.js from data.contact.cards -->
          <div class="contact-cards reveal"></div>

          <form class="contact-form reveal" id="contact-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="cf-name">Name</label>
                <input type="text" id="cf-name" name="name" placeholder="Your name" required autocomplete="name" />
                <span class="field-err" role="alert"></span>
              </div>
              <div class="form-group">
                <label for="cf-email">Email</label>
                <input type="email" id="cf-email" name="email" placeholder="your@email.com" required autocomplete="email" />
                <span class="field-err" role="alert"></span>
              </div>
            </div>
            <div class="form-group">
              <label for="cf-subject">Subject</label>
              <input type="text" id="cf-subject" name="subject" placeholder="What's this about?" />
            </div>
            <div class="form-group">
              <label for="cf-message">Message</label>
              <textarea id="cf-message" name="message" rows="5" placeholder="Tell me about your project or opportunity..." required></textarea>
              <span class="field-err" role="alert"></span>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
              <span>Send Message</span>
              <i class="fas fa-paper-plane"></i>
            </button>
            <div class="form-status" id="form-status" role="alert" aria-live="polite"></div>
          </form>
        </div>
      </div>
    </section>

  </main>

  <!-- ====== Footer ====== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <a href="#home" class="nav-brand">Adil<span class="accent-dot">.</span></a>
          <!-- Updated by render.js from data.meta.subtitle -->
          <p></p>
        </div>
        <!-- Populated by render.js from data.nav.links -->
        <nav class="footer-nav" aria-label="Footer navigation"></nav>
        <!-- Populated by render.js from data.meta -->
        <div class="footer-socials"></div>
      </div>
      <div class="footer-bottom">
        <p>&copy; <span id="year"></span> Adil Ansary. Built with precision.</p>
        <a href="#home" class="back-to-top" aria-label="Back to top"><i class="fas fa-arrow-up"></i></a>
      </div>
    </div>
  </footer>

  <!-- Load order: data → render → behaviour -->
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
